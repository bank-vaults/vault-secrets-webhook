env:
  VAULT_IMAGE: hashicorp/vault:2.0.1
  VAULT_ADDR_ALLOWLIST: "https://vault.default.svc.cluster.local:8200"

replicaCount: 1

image:
  pullPolicy: Never

configMapMutation: true
configmapFailurePolicy: "Fail"
podsFailurePolicy: "Fail"
secretsFailurePolicy: "Fail"

namespaceSelector:
  matchExpressions:
    # https://kubernetes.io/docs/reference/labels-annotations-taints/#kubernetes-io-metadata-name
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
        - kube-system
        - vault-operator
        - vault-secrets-webhook
